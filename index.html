<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Hangman guessing game</h1>
<div id="hangman-drawing">
    <img id="hangman-part-1" src="" class="hangman-part">
    <img id="hangman-part-2" src="" class="hangman-part">
    <img id="hangman-part-3" src="" class="hangman-part">
    <img id="hangman-part-4" src="" class="hangman-part">
    <img id="hangman-part-5" src="" class="hangman-part">
    <img id="hangman-part-6" src="" class="hangman-part">
</div>
<div id="instructions">
    <p>Guess the mystery word one letter at a time!</p>
    <p>Theme: <span id="theme">Spanish City</span></p>
    <p>You have <span id="guesses-left">6</span> wrong guesses remaining.</p>
    <p>Level: <span id="progress">1/5</span></p>
</div>
<div id="word-display">
</div>
    <div>
    <input type="text" id="letter-input" placeholder="Enter a letter">
    <button onclick="checkGuess()">Guess</button>
    </div>
    <div id="wrong-letters">
        <p>Wrong letters: <span id="wrong-list"></span></p>
    </div>

    <script src="script.js">_</script>
</body>
</html>
