<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Hangman guessing game</h1>
    <div id="word-display">
    <div class="letter-box" id="box0">_</div>
    <div class="letter-box" id="box1">_</div>
    <div class="letter-box" id="box2">_</div>
    <div class="letter-box" id="box3">_</div>
    <div class="letter-box" id="box4">_</div>
    <div class="letter-box" id="box5">_</div>
    <div class="letter-box" id="box6">_</div>
    <div class="letter-box" id="box7">_</div>
    <div class="letter-box" id="box8">_</div>
    </div>
    <div>
    <input type="text" id="letter-input" placeholder="Enter a letter">
    <button onclick="checkGuess()">Guess</button>
    </div>
    <div id="wrong-letters">
        <p>Wrong letters: <span id="wrong-list"></span></p>
    </div>

    <script src="script.js">_</script>
</body>
</html>
